<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact | Yuva Rejuvenation</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root{
--gold:#D4AF37;
--black:#050505;
--gray:#111;
--white:#f5f5f5;
}

body{
margin:0;
font-family:Montserrat;
background:var(--black);
color:white;
}

h1,h2{font-family:"Playfair Display"; color:var(--gold);}

/* HEADER */
header{
text-align:center;
padding:25px;
border-bottom:1px solid #222;
background:#000;
}

/* CONTAINER */
.container{
max-width:1000px;
margin:auto;
padding:20px;
}

.card{
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #222;
margin:15px 0;
}

/* INPUT */
input,select,textarea{
width:100%;
padding:12px;
margin:8px 0;
background:#1a1a1a;
border:none;
color:white;
border-radius:6px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
background:var(--gold);
border:none;
color:black;
font-weight:bold;
border-radius:6px;
cursor:pointer;
}

button:hover{background:#b8962f}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

/* MAP */
iframe{
width:100%;
height:250px;
border-radius:10px;
border:0;
}

/* CHAT */
.chat{
position:fixed;
bottom:20px;
right:20px;
width:280px;
background:#111;
border:1px solid var(--gold);
border-radius:10px;
overflow:hidden;
}

.chat-header{
background:var(--gold);
color:black;
padding:10px;
font-weight:bold;
}

.chat-box{
height:180px;
overflow:auto;
padding:10px;
font-size:13px;
}

.chat-input{
display:flex;
}

.chat-input input{
flex:1;
}
</style>
</head>

<body>

<header>
<h1>Contact & Appointment</h1>
<p>Yuva Rejuvenation Clinic</p>
</header>

<div class="container">

<!-- CONTACT FORM -->
<div class="card">
<h2>📞 Book Appointment</h2>

<div class="grid">

<div>
<input id="name" placeholder="Full Name">
<input id="phone" placeholder="Phone Number">
<input id="email" placeholder="Email">
</div>

<div>
<input type="date" id="date">

<select id="slot">
<option>10:00 AM</option>
<option>12:00 PM</option>
<option>02:00 PM</option>
<option>04:00 PM</option>
<option>06:00 PM</option>
</select>

<textarea id="msg" placeholder="Your Message"></textarea>
</div>

</div>

<button onclick="book()">📅 Submit Booking</button>
<button onclick="pay()">💳 Pay Now</button>
</div>

<!-- MAP -->
<div class="card">
<h2>📍 Our Location</h2>
<iframe src="https://maps.google.com/maps?q=lucknow&t=&z=13&output=embed"></iframe>
</div>

<!-- ADMIN -->
<div class="card">
<h2>📊 Admin Panel</h2>

<input id="pass" placeholder="Admin Password">
<button onclick="login()">Login</button>

<div id="admin" style="display:none;">
<h3>All Bookings</h3>
<div id="list"></div>
</div>

</div>

</div>

<!-- CHATBOT -->
<div class="chat">
<div class="chat-header">🤖 AI Assistant</div>

<div class="chat-box" id="chatBox"></div>

<div class="chat-input">
<input id="chatInput">
<button onclick="chat()">Send</button>
</div>
</div>

<script>

// ================= BOOKING =================
function book(){

let name=document.getElementById("name").value;
let phone=document.getElementById("phone").value;
let email=document.getElementById("email").value;
let date=document.getElementById("date").value;
let slot=document.getElementById("slot").value;

if(!name||!phone||!date){
alert("Fill required fields");
return;
}

let data=JSON.parse(localStorage.getItem("bookings")||"[]");

// SLOT BLOCK
let exists=data.find(b=>b.date===date && b.slot===slot);
if(exists){
alert("❌ Slot already booked");
return;
}

data.push({name,phone,email,date,slot});
localStorage.setItem("bookings",JSON.stringify(data));

alert("✅ Booking Successful");
loadAdmin();
}

// ================= PAYMENT =================
function pay(){
window.open("https://rzp.io/","_blank");
}

// ================= ADMIN =================
function login(){
let pass=document.getElementById("pass").value;

if(pass==="admin123"){
document.getElementById("admin").style.display="block";
loadAdmin();
}else{
alert("Wrong Password");
}
}

function loadAdmin(){
let data=JSON.parse(localStorage.getItem("bookings")||"[]");
let html="";

data.forEach((b,i)=>{
html+=`<p>${i+1}. ${b.name} | ${b.phone} | ${b.date} | ${b.slot}</p>`;
});

document.getElementById("list").innerHTML=html;
}

// ================= CHATBOT =================
function chat(){

let input=document.getElementById("chatInput");
let text=input.value;
if(!text) return;

let box=document.getElementById("chatBox");

box.innerHTML+=`<div><b>You:</b> ${text}</div>`;

let reply="";

if(text.includes("price")){
reply="💰 Starts ₹999";
}
else if(text.includes("book")){
reply="📅 Use booking form";
}
else{
reply="🤖 AI: Connect OpenAI API for smart responses";
}

box.innerHTML+=`<div><b>AI:</b> ${reply}</div>`;
input.value="";
}

</script>

</body>
</html>
